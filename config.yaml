market:
    korea:
        enabled: true
        regular_open: "09:00"
        regular_close: "15:30"
        stop_new_buy_before_close_minutes: 10
        force_sell_before_close_minutes: 10
        entry_windows:
            - ["09:10", "15:00"]
        watchlist:
            - "005930"

strategy:
    name: "vwap-volume-breakout-scalping"
    volume_multiplier: 1.75
    breakout_window_minutes: 5
    volume_lookback_minutes: 5
    vwap_hold_candles: 5
    max_daily_rise_percent: 15.0
    previous_candle_max_drop_percent: -2.0
    min_execution_strength: 55.0
    max_spread_percent: 0.3
    max_upper_wick_percent: 45.0
    market_down_block_threshold_percent: -0.5
    max_breakout_chase_percent: 0.8

risk:
    enforce_daily_loss_limit: false
    max_daily_loss: 5000
    max_daily_loss_percent: -1.5
    max_daily_trade_count: 5
    max_position_count: 2
    take_profit_percent: 0.8
    second_take_profit_percent: 1.7
    partial_take_profit_ratio: 0.5
    stop_loss_percent: -0.7
    break_even_stop_percent: 0.0
    stale_position_minutes: 5
    stale_position_min_profit_percent: 0.5
    volume_drop_exit_min_hold_minutes: 2.0
    profit_protection_min_profit_amount: 0
    profit_protection_min_hold_minutes: 2.0
    profit_protection_weak_signal_count: 2
    profit_protection_max_execution_strength: 30.0
    profit_protection_min_volume_multiplier: 1.0
    profit_protection_upper_wick_percent: 80.0
    unfilled_order_timeout_seconds: 30
    reentry_cooldown_minutes: 15

cost:
    buy_fee_percent: 0.015
    sell_fee_percent: 0.015
    sell_tax_percent: 0.20
    slippage_percent: 0.05

watchlist:
    kr:
        enabled: true
        mode: dynamic
        top_trading_value_limit: 100
        refresh_interval_seconds: 180
        exclude_vi_after_minutes: 10
        exclude_warning_stocks: true
        exclude_managed_stocks: true
        exclude_suspended_stocks: true
        min_price: 1000
        max_spread_rate: 0.3
        min_orderbook_depth: 10000000
